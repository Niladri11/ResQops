version: '3.8'

services:

  # ── Flask API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resqops-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - AWS_REGION=us-east-1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - resqops-net

  # ── Prometheus (local monitoring preview) ──────────────────────────────────
  prometheus:
  
    image: prom/prometheus:latest
    container_name: resqops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - resqops-net

  # ── Grafana (local dashboard preview) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: resqops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=resqops123
    networks:
      - resqops-net

networks:
  resqops-net:
    driver: bridge