groups:
  - name: resqops-alerts
    rules:

      - alert: AppDown
        expr: up{job="resqops-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ResQOps API is DOWN"
          description: "Flask API unreachable for over 1 minute"

      - alert: HighErrorRate
        expr: >
          rate(resqops_request_total_total{status=~"5.."}[5m])
          /
          rate(resqops_request_total_total[5m])
          * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate above 5% for 2 minutes"

      - alert: HighLatency
        expr: >
          histogram_quantile(0.95,
            rate(resqops_request_latency_seconds_bucket[5m])
          ) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "p95 latency above 2 seconds"

      - alert: HighCPU
        expr: >
          100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU above 80% for 5 minutes"